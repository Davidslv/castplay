name: Feature request
description: Suggest a capability for castplay.
title: '[feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Before writing code, please describe the problem here — castplay optimises for **staying tiny and dependency-free**, so the bar for new features is "does this earn its bytes for the drop-in use case?" See GOVERNANCE.md.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The concrete situation you hit. Focus on the problem, not a specific solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like castplay to do. If it can already be done by styling the terminal element or overriding `Castplay.palette`, say what's missing.
    validations:
      required: true
  - type: dropdown
    id: cost
    attributes:
      label: Does this keep castplay dependency-free and build-step-free?
      options:
        - 'Yes — pure vanilla JS, no new dependency or build'
        - 'Not sure'
        - 'No — it would need a dependency or a build step'
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other approaches.
    validations:
      required: false
