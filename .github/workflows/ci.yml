name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      # The library and its tests are dependency-free, so no install is needed
      # to run them — this job stays fast and proves the zero-dep promise.
      - name: Run tests
        run: node --test

  lint:
    name: lint (js, format, markdown, docs, casts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - name: Install dev tooling
        run: npm ci
      - name: Lint
        run: npm run lint

  yaml:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install yamllint
        run: pip install yamllint==1.38.0
      - name: Lint YAML
        run: yamllint -c .yamllint.yml .github/ CITATION.cff .yamllint.yml
