version: 2
# castplay ships zero *runtime* dependencies. The npm packages below are
# dev-only lint/format tooling (they never reach users), and the GitHub Actions
# are pinned in .github/workflows. Those are the two ecosystems the repo
# actually has, so those are the two Dependabot watches — no others.
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'deps'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
